<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 경로 이탈!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #050810; font-family: sans-serif; }
        .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* 글래스모피즘 카드 */
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 둥둥 떠다니는 애니메이션 (우주인 효과) */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating { animation: float 5s ease-in-out infinite; }
        
        /* 배경 회로 패턴 */
        .circuit-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(circle at 1px 1px, rgba(16, 185, 129, 0.08) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-6 overflow-hidden relative">
    
    <div class="circuit-bg"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-emerald-500/10 rounded-full blur-[100px] -z-10"></div>

    <div class="glass-card p-12 md:p-20 rounded-[3rem] text-center max-w-2xl w-full relative z-10 border-t border-white/20">
        
        <div class="text-8xl md:text-9xl mb-8 floating">
            <i class="fas fa-user-astronaut text-slate-400 drop-shadow-[0_0_20px_rgba(255,255,255,0.2)]"></i>
        </div>
        
        <h1 class="text-7xl md:text-8xl font-black font-jakarta text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500 tracking-tighter mb-4">404</h1>
        <h2 class="text-2xl md:text-3xl font-bold text-white mb-6">Oops! Page not found 👀</h2>
        
        <p class="text-slate-400 text-base md:text-lg mb-10 leading-relaxed">
            앗! '위대한 여정'의 지도에 없는 미지의 공간에 도착하셨군요.<br>
            입력하신 주소가 올바른지 다시 한번 확인해 주세요!
        </p>
        
        <a href="index.html" class="inline-flex items-center justify-center gap-3 px-10 py-5 bg-gradient-to-r from-emerald-500 to-emerald-400 text-white font-black text-lg rounded-2xl hover:scale-105 transition-transform shadow-[0_0_20px_rgba(16,185,129,0.4)]">
            <i class="fas fa-home"></i> Back to Base Camp
        </a>
        
    </div>

</body>
</html>
