<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOOLS - 생산성 관제센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="text-slate-200 antialiased min-h-screen flex flex-col overflow-x-hidden"
  >
    <div class="circuit-bg"></div>

    <nav class="fixed top-0 w-full z-50 glass-nav">
      <div
        class="max-w-7xl mx-auto px-6 h-18 flex items-center justify-between"
      >
        <span
          class="text-2xl font-black tracking-tighter font-jakarta dynamic-logo"
          >Chang-WOO | TOOLS</span
        >
        <div
          class="hidden md:flex gap-10 text-sm font-bold uppercase tracking-widest"
        >
          <a
            href="index.html"
            class="text-slate-400 hover:text-white transition flex items-center gap-2"
          >
            <i class="fas fa-home"></i> Back to Home
          </a>
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-36 pb-20 flex-1 w-full">
      <div class="text-center mb-16">
        <span
          class="text-blue-500 font-black tracking-[0.2em] text-[10px] uppercase block mb-3"
          >Productivity Workspace</span
        >
        <h1
          class="text-4xl md:text-5xl font-black text-white tracking-tight mb-4 flex items-center justify-center gap-4"
        >
          사이버 관제센터 <i class="fas fa-microchip text-blue-500"></i>
        </h1>
        <p class="text-slate-400 text-sm max-w-2xl mx-auto leading-relaxed">
          위대한 여정을 가속하는 스마트 도구 모음입니다.<br />
          보안, 일정 관리, 글로벌 네트워킹을 한곳에서 통제하세요.
        </p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div
          class="glass-card p-8 rounded-3xl relative overflow-hidden shadow-2xl border border-white/10"
        >
          <h3
            class="text-2xl font-black text-white mb-6 flex items-center gap-3"
          >
            <i class="fas fa-lock text-blue-500"></i> Password
          </h3>
          <div class="relative mb-6">
            <input
              type="text"
              id="pw-result"
              class="w-full bg-[#0a0f1d] border border-white/10 text-white px-5 py-4 rounded-xl text-xl tracking-[0.2em] outline-none font-mono text-center shadow-inner"
              readonly
              placeholder="Click Generate"
            />
            <button
              id="pw-copy"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-400 transition p-2 cursor-pointer"
              title="클립보드 복사"
            >
              <i class="far fa-copy text-2xl"></i>
            </button>
          </div>

          <div
            class="space-y-5 bg-white/[0.02] p-5 rounded-2xl border border-white/5"
          >
            <div class="flex justify-between items-center mb-1">
              <label class="text-slate-300 font-bold text-base">Length</label>
              <span
                id="pw-length-val"
                class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-lg font-black text-sm"
                >12</span
              >
            </div>
            <input
              type="range"
              id="pw-length"
              min="4"
              max="20"
              value="12"
              class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
            />

            <div class="grid grid-cols-2 gap-3 mt-4">
              <label
                class="flex items-center justify-between text-slate-400 cursor-pointer hover:text-slate-200 transition p-3 bg-white/[0.01] rounded-xl border border-white/[0.03]"
                ><span class="text-sm font-semibold">Upper</span
                ><input
                  type="checkbox"
                  id="pw-upper"
                  checked
                  class="w-4 h-4 accent-blue-500"
              /></label>
              <label
                class="flex items-center justify-between text-slate-400 cursor-pointer hover:text-slate-200 transition p-3 bg-white/[0.01] rounded-xl border border-white/[0.03]"
                ><span class="text-sm font-semibold">Lower</span
                ><input
                  type="checkbox"
                  id="pw-lower"
                  checked
                  class="w-4 h-4 accent-blue-500"
              /></label>
              <label
                class="flex items-center justify-between text-slate-400 cursor-pointer hover:text-slate-200 transition p-3 bg-white/[0.01] rounded-xl border border-white/[0.03]"
                ><span class="text-sm font-semibold">Num</span
                ><input
                  type="checkbox"
                  id="pw-number"
                  checked
                  class="w-4 h-4 accent-blue-500"
              /></label>
              <label
                class="flex items-center justify-between text-slate-400 cursor-pointer hover:text-slate-200 transition p-3 bg-white/[0.01] rounded-xl border border-white/[0.03]"
                ><span class="text-sm font-semibold">Sym</span
                ><input
                  type="checkbox"
                  id="pw-symbol"
                  checked
                  class="w-4 h-4 accent-blue-500"
              /></label>
            </div>
          </div>
          <button
            id="pw-generate"
            class="w-full py-4 mt-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-base rounded-xl hover:scale-[1.02] transition-transform flex justify-center items-center gap-2"
          >
            <i class="fas fa-magic"></i> GENERATE
          </button>
          <div
            class="mt-6 bg-white/[0.02] p-4 rounded-2xl border border-white/5"
          >
            <div class="flex items-center justify-between mb-2">
              <span
                class="text-sm text-slate-400 font-bold uppercase tracking-widest"
                >Strength</span
              >
              <span
                id="pw-strength-text"
                class="text-sm font-black text-emerald-400 uppercase tracking-widest"
                >Strong</span
              >
            </div>
            <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
              <div
                id="pw-strength-bar"
                class="h-full bg-emerald-500 transition-all duration-500 ease-out w-full shadow-[0_0_10px_rgba(16,185,129,0.8)]"
              ></div>
            </div>
          </div>
        </div>

        <div
          class="glass-card p-8 rounded-3xl relative overflow-hidden shadow-2xl border border-white/10 flex flex-col h-full"
        >
          <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-black text-white flex items-center gap-3">
              <i class="fas fa-check-double text-blue-500"></i> Missions
            </h3>
            <span
              id="task-date"
              class="text-sm font-bold text-slate-400 tracking-wider"
            ></span>
          </div>
          <div class="relative mb-6">
            <input
              type="text"
              id="todo-input"
              class="w-full bg-[#0a0f1d] border border-white/10 text-white px-5 py-4 rounded-xl outline-none focus:border-blue-500 transition shadow-inner text-base"
              placeholder="새로운 여정을 입력하세요..."
            />
            <button
              id="add-btn"
              class="absolute right-2 top-1/2 -translate-y-1/2 bg-blue-600 text-white w-10 h-10 rounded-lg hover:bg-blue-500 transition flex items-center justify-center"
            >
              <i class="fas fa-plus"></i>
            </button>
          </div>
          <div
            class="flex gap-6 mb-4 border-b border-white/10 pb-3"
            id="todo-filters"
          >
            <button
              class="filter-btn active text-blue-400 font-bold text-sm tracking-wide uppercase pb-3 -mb-3"
              data-filter="all"
            >
              All
            </button>
            <button
              class="filter-btn text-slate-500 hover:text-slate-300 font-bold text-sm tracking-wide uppercase transition pb-3 -mb-3"
              data-filter="active"
            >
              Active
            </button>
            <button
              class="filter-btn text-slate-500 hover:text-slate-300 font-bold text-sm tracking-wide uppercase transition pb-3 -mb-3"
              data-filter="completed"
            >
              Completed
            </button>
          </div>
          <ul
            id="todo-list"
            class="space-y-3 mb-6 flex-1 overflow-y-auto pr-2 custom-scrollbar min-h-[200px]"
          ></ul>
          <div
            class="flex justify-between items-center pt-4 border-t border-white/10 mt-auto"
          >
            <span id="items-left" class="text-sm font-bold text-slate-500"
              >0 tasks left</span
            >
            <button
              id="clear-completed"
              class="text-sm font-bold text-slate-500 hover:text-red-400 transition cursor-pointer"
            >
              Clear
            </button>
          </div>
        </div>

        <div
          class="glass-card p-8 rounded-3xl relative overflow-hidden shadow-2xl border border-white/10 flex flex-col h-full group hover:border-purple-500/50 transition-all duration-300"
        >
          <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-black text-white flex items-center gap-3">
              <i class="fab fa-github text-purple-500"></i> GitHub
            </h3>
          </div>
          <div
            class="flex-1 flex flex-col justify-center items-center text-center py-6 mb-6"
          >
            <div
              class="w-20 h-20 rounded-full overflow-hidden border-4 border-slate-700/50 shadow-inner mb-4 group-hover:scale-110 group-hover:border-purple-500/50 transition-all duration-500"
            >
              <img
                src="profile.jpg"
                alt="이창우 프로필"
                class="w-full h-full object-cover"
              />
            </div>
            <p class="text-slate-400 text-sm leading-relaxed">
              lcw6685837님의<br />개발 저장소를 탐색하세요.<br />지식의 성장을
              기록하고 있습니다.
            </p>
          </div>
          <a
            href="github.html"
            target="_blank"
            class="w-full py-4 mt-auto bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-black text-base rounded-xl hover:scale-[1.02] transition-transform flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(147,51,234,0.4)]"
          >
            <i class="fas fa-satellite-dish"></i> LAUNCH RADAR
          </a>
        </div>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
